# golangci-lint configuration
# Docs: https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  go: "1.22"
  modules-download-mode: readonly

linters:
  enable:
    # Errors and bugs
    - errcheck        # Unhandled errors
    - govet           # Compiler-level analysis
    - staticcheck     # Advanced static analysis
    - ineffassign     # Ineffectual assignments
    - unused          # Unused code
    # Code quality
    - gocyclo         # Cyclomatic complexity
    - gofmt           # Standard Go formatting
    - goimports       # Import organization
    - gocritic        # Code improvement suggestions
    - revive          # Improved golint replacement
    - misspell        # Spelling errors in comments
    # Security
    - gosec           # Security vulnerability detection
    # Tests
    - testifylint     # Best practices with testify

linters-settings:
  gocyclo:
    min-complexity: 15

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: error-strings
      - name: error-return
      - name: unused-parameter

  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G204

  depguard:
    rules:
      # Domain layer must NOT depend on frameworks or DB drivers (hexagonal rule)
      domain-isolation:
        files:
          - "**/internal/domain/**"
        deny:
          - pkg: "github.com/gin-gonic/gin"
            desc: "Domain must not depend on HTTP framework"
          - pkg: "github.com/go-chi/chi"
            desc: "Domain must not depend on HTTP framework"
          - pkg: "database/sql"
            desc: "Domain must not depend on database directly"

  goimports:
    local-prefixes: github.com/javier/api-task-user

  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10

output:
  formats:
    - format: colored-line-number
  sort-results: true
